name: ets-emea

services:
  mongo:
    image: mongo:7
    container_name: ets-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ets-api
    restart: unless-stopped
    volumes:
      - ./api:/var/www/api
      - api-var:/var/www/api/var
      - api-vendor:/var/www/api/vendor
    environment:
      APP_ENV: dev
      MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=admin
      MONGODB_DB: ${MONGO_DB_NAME}
    depends_on:
      - mongo
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ets-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./api/public:/var/www/api/public:ro
    depends_on:
      - api
    networks:
      - app-net

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: ets-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app
      - front-node-modules:/app/node_modules
      - front-next:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - nginx
    networks:
      - app-net

volumes:
  mongo-data:
  api-var:
  api-vendor:
  front-node-modules:
  front-next:

networks:
  app-net:
    driver: bridge